name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    name: Test and build Apple apps
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Run Swift tests
        run: swift test

      - name: Build macOS and iOS apps
        run: ./script/build_xcode_apps.sh
